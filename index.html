<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Palak ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to bottom, #ffe6f0, #ffccd5);
}

h1 {
    margin-top: 100px;
    font-size: 2.5rem;
    color: #ff3366;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn {
    background-color: #ff4d88;
    color: white;
}

#noBtn {
    background-color: #ccc;
    position: absolute;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: floatUp 4s linear infinite;
}

/* Flowers */
.flower {
    position: absolute;
    font-size: 22px;
    animation: fall 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-700px); opacity: 0; }
}

@keyframes fall {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(700px); }
}
</style>
</head>

<body>

<h1>Palak, will you be mine forever? ❤️</h1>

<button id="yesBtn">Yes 😍</button>
<button id="noBtn">No 😏</button>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<script>

// PLAY MUSIC AFTER FIRST CLICK
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
}, { once: true });

// NO BUTTON RUN AWAY
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES BUTTON CLICK
document.getElementById("yesBtn").addEventListener("click", () => {
    document.body.innerHTML = "<h1>I love you sooo much ❤️</h1>";
    startHearts();
    startFlowers();
});

// HEARTS FUNCTION
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }, 200);
}

// FLOWERS FUNCTION
function startFlowers() {
    setInterval(() => {
        const flower = document.createElement("div");
        flower.className = "flower";
        flower.innerHTML = "🌸";
        flower.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(flower);

        setTimeout(() => flower.remove(), 5000);
    }, 300);
}

</script>

<!-- Name: Aadi | Roll No: 007 -->

</body>
</html>
